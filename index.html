<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Pas à pas">
<meta name="theme-color" content="#3D3450">
<title>Pas à pas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════
   TOKENS
═══════════════════════════════ */
:root {
  --bg:           #F8F6F2;
  --surface:      #FDFCFA;
  --surface-2:    #F2EFE9;
  --night:        #3D3450;
  --night-mid:    #524868;
  --night-soft:   #EDE9F7;
  --text:         #2A2535;
  --text-soft:    #7B7690;
  --text-light:   #B8B4C8;
  --accent:       #7C6FA0;
  --accent-mid:   #A394C4;
  --accent-soft:  #EDE9F7;
  --rose:         #B47B8A;
  --rose-soft:    #F7EAED;
  --sage:         #6B9E8A;
  --sage-soft:    #E8F4F0;
  --gold:         #C49A6C;
  --gold-soft:    #FBF3E8;
  --border:       rgba(61,52,80,0.09);
  --border-mid:   rgba(61,52,80,0.15);
  --r:            18px;
  --r-sm:         10px;
  --r-xs:         6px;
  --nav-h:        68px;
}

/* ═══════════════════════════════
   RESET & BASE
═══════════════════════════════ */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 16px;
  line-height: 1.6;
  overflow: hidden;
}
button { font-family: inherit; cursor: pointer; }
textarea, input { font-family: inherit; }

/* ═══════════════════════════════
   SCREEN SYSTEM
═══════════════════════════════ */
.screen {
  position: fixed; inset: 0;
  display: none; flex-direction: column;
  background: var(--bg);
  overflow: hidden;
}
.screen.active { display: flex; }

.scroll-area {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding-bottom: calc(var(--nav-h) + 16px);
}
.scroll-area::-webkit-scrollbar { display: none; }

/* ═══════════════════════════════
   BOTTOM NAV
═══════════════════════════════ */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0;
  height: var(--nav-h);
  background: var(--surface);
  border-top: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-around;
  padding-bottom: env(safe-area-inset-bottom);
  z-index: 200;
}
.nav-btn {
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  background: none; border: none;
  padding: 8px 20px;
  color: var(--text-light);
  transition: color 0.2s;
}
.nav-btn.active { color: var(--accent); }
.nav-btn svg { width: 22px; height: 22px; stroke-width: 1.7; }
.nav-label { font-size: 10px; font-weight: 500; letter-spacing: 0.03em; }

/* ═══════════════════════════════
   SHARED COMPONENTS
═══════════════════════════════ */
.back-btn {
  display: inline-flex; align-items: center; gap: 6px;
  background: none; border: none;
  color: var(--text-soft); font-size: 14px;
  padding: 0; margin-bottom: 22px;
}
.back-btn svg { width: 16px; height: 16px; }

.pill {
  display: inline-flex; align-items: center;
  padding: 4px 12px; border-radius: 50px;
  font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase;
}
.pill.accent  { background: var(--accent-soft); color: var(--accent); }
.pill.rose    { background: var(--rose-soft);   color: var(--rose); }
.pill.sage    { background: var(--sage-soft);   color: var(--sage); }
.pill.gold    { background: var(--gold-soft);   color: var(--gold); }
.pill.night   { background: var(--night);       color: white; }

.card {
  margin: 0 20px 12px;
  background: var(--surface);
  border-radius: var(--r);
  border: 1px solid var(--border);
  cursor: pointer;
  transition: transform 0.14s, box-shadow 0.14s;
}
.card:active { transform: scale(0.985); }

.section-label {
  font-size: 10px; font-weight: 600;
  letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--text-light);
}

/* ═══════════════════════════════
   MAINTENANT SCREEN
═══════════════════════════════ */
#maintenant-screen .scroll-area { padding-bottom: calc(var(--nav-h) + 24px); }

.main-hero {
  padding: 56px 24px 32px;
  background: var(--night);
  position: relative; overflow: hidden;
}
.main-hero::before {
  content: '';
  position: absolute; top: -80px; right: -80px;
  width: 280px; height: 280px;
  background: radial-gradient(circle, rgba(124,111,160,0.35) 0%, transparent 65%);
  pointer-events: none;
}
.main-hero::after {
  content: '';
  position: absolute; bottom: -40px; left: -20px;
  width: 180px; height: 180px;
  background: radial-gradient(circle, rgba(180,123,138,0.15) 0%, transparent 65%);
  pointer-events: none;
}
.hero-eyebrow {
  font-size: 11px; font-weight: 500;
  letter-spacing: 0.14em; text-transform: uppercase;
  color: rgba(255,255,255,0.35);
  margin-bottom: 12px;
}
.hero-title {
  font-family: 'Playfair Display', serif;
  font-size: 38px; line-height: 1.12;
  color: white;
  margin-bottom: 10px;
}
.hero-sub {
  font-size: 14px; font-weight: 300;
  color: rgba(255,255,255,0.45);
  line-height: 1.5;
}

/* Content card in maintenant */
.moment-card {
  margin: 24px 20px 0;
  background: var(--surface);
  border-radius: var(--r);
  border: 1px solid var(--border);
  overflow: hidden;
}
.moment-card-type {
  padding: 14px 20px 0;
  display: flex; align-items: center; justify-content: space-between;
}
.moment-card-body { padding: 16px 20px 20px; }
.moment-card-title {
  font-family: 'Playfair Display', serif;
  font-size: 21px; line-height: 1.25;
  color: var(--text);
  margin-bottom: 10px;
}
.moment-card-text {
  font-size: 14px; line-height: 1.72;
  color: var(--text-soft);
}
.moment-card-footer {
  padding: 14px 20px;
  background: var(--surface-2);
  border-top: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.moment-start-btn {
  background: var(--accent);
  color: white; border: none;
  border-radius: 50px;
  padding: 9px 20px;
  font-size: 13px; font-weight: 500;
  transition: opacity 0.15s;
}
.moment-start-btn:active { opacity: 0.85; }
.moment-skip-btn {
  background: none; border: none;
  color: var(--text-light); font-size: 13px;
  display: flex; align-items: center; gap: 4px;
}
.moment-skip-btn svg { width: 14px; height: 14px; }

.main-divider {
  padding: 28px 20px 12px;
  display: flex; align-items: center; gap: 12px;
}
.main-divider .section-label { flex-shrink: 0; }
.main-divider-line { flex: 1; height: 1px; background: var(--border); }

.quick-entry-card {
  margin: 0 20px 10px;
  background: var(--surface);
  border-radius: var(--r-sm);
  border: 1px solid var(--border);
  padding: 14px 18px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: space-between;
  transition: background 0.14s;
}
.quick-entry-card:active { background: var(--accent-soft); }
.quick-entry-left {}
.quick-entry-title { font-size: 14px; font-weight: 500; color: var(--text); margin-bottom: 3px; }
.quick-entry-domain { font-size: 11px; color: var(--text-light); }
.quick-entry-arrow { color: var(--text-light); font-size: 16px; }

/* ═══════════════════════════════
   BIBLIOTHEQUE SCREEN
═══════════════════════════════ */
.biblio-header {
  padding: 52px 20px 16px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
}
.biblio-title {
  font-family: 'Playfair Display', serif;
  font-size: 26px; color: var(--text);
  margin-bottom: 14px;
}
.search-wrap {
  display: flex; align-items: center; gap: 10px;
  background: var(--bg);
  border-radius: var(--r-sm);
  padding: 11px 14px;
  border: 1px solid var(--border);
}
.search-wrap svg { width: 15px; height: 15px; color: var(--text-light); flex-shrink: 0; }
.search-wrap input {
  flex: 1; border: none; background: none;
  font-size: 15px; color: var(--text); outline: none;
}
.search-wrap input::placeholder { color: var(--text-light); }

/* Segment toggle */
.segment {
  display: flex;
  background: var(--surface-2);
  border-radius: 50px;
  padding: 3px;
  margin: 14px 20px 0;
  border: 1px solid var(--border);
}
.seg-btn {
  flex: 1; background: none; border: none;
  padding: 8px 0;
  font-size: 13px; font-weight: 500;
  color: var(--text-soft);
  border-radius: 50px;
  transition: all 0.18s;
}
.seg-btn.active {
  background: var(--surface);
  color: var(--accent);
  box-shadow: 0 1px 4px rgba(61,52,80,0.12);
}

/* Filter chips */
.filter-row {
  display: flex; gap: 8px;
  padding: 12px 20px;
  overflow-x: auto; scrollbar-width: none;
}
.filter-row::-webkit-scrollbar { display: none; }
.chip {
  flex-shrink: 0;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 50px;
  padding: 6px 14px;
  font-size: 12px; font-weight: 500;
  color: var(--text-soft);
  transition: all 0.15s;
}
.chip.active          { background: var(--accent);  border-color: var(--accent);  color: white; }
.chip.act-rose        { background: var(--rose);    border-color: var(--rose);    color: white; }
.chip.act-sage        { background: var(--sage);    border-color: var(--sage);    color: white; }
.chip.act-gold        { background: var(--gold);    border-color: var(--gold);    color: white; }

/* Entry card in biblio */
.entry-card {
  padding: 18px 20px;
}
.entry-card-domain {
  font-size: 10px; font-weight: 600;
  letter-spacing: 0.1em; text-transform: uppercase;
  margin-bottom: 7px;
}
.entry-card-domain.interieur  { color: var(--accent); }
.entry-card-domain.autres     { color: var(--rose); }
.entry-card-domain.agir       { color: var(--sage); }
.entry-card-domain.ressources { color: var(--gold); }
.entry-card-title {
  font-family: 'Playfair Display', serif;
  font-size: 18px; line-height: 1.3;
  color: var(--text); margin-bottom: 7px;
}
.entry-card-teaser {
  font-size: 13px; line-height: 1.55;
  color: var(--text-soft);
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}
.entry-card-footer {
  display: flex; align-items: center; justify-content: space-between;
  margin-top: 12px;
}
.entry-read-badge {
  font-size: 11px;
  color: var(--text-light);
}
.entry-read-badge.done { color: var(--accent); }

/* Theory card in biblio */
.theory-card { padding: 18px 20px; }
.theory-card-level {
  font-size: 10px; font-weight: 600;
  letter-spacing: 0.1em; text-transform: uppercase;
  margin-bottom: 7px;
}
.theory-card-level.fondation    { color: var(--accent); }
.theory-card-level.approfondissement { color: var(--text-light); }
.theory-card-title {
  font-family: 'Playfair Display', serif;
  font-size: 17px; line-height: 1.3;
  color: var(--text); margin-bottom: 5px;
}
.theory-card-author { font-size: 12px; color: var(--text-light); font-style: italic; }

/* ═══════════════════════════════
   ENTRY DETAIL SCREEN
═══════════════════════════════ */
.entry-header { padding: 52px 20px 20px; }
.entry-main-title {
  font-family: 'Playfair Display', serif;
  font-size: 28px; line-height: 1.2;
  color: var(--text); margin-top: 10px;
}

/* Tabs */
.tabs-bar {
  display: flex;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  position: sticky; top: 0; z-index: 10;
  padding: 0 20px;
}
.tab-btn {
  flex: 1; background: none; border: none;
  padding: 13px 0;
  font-size: 13px; font-weight: 500;
  color: var(--text-light);
  border-bottom: 2px solid transparent;
  transition: all 0.18s; margin-bottom: -1px;
}
.tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

/* Entry content */
.entry-body { padding: 26px 20px; }
.body-label {
  font-size: 10px; font-weight: 600;
  letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--text-light); margin-bottom: 16px;
}
.body-p {
  font-size: 15px; line-height: 1.82;
  color: var(--text); margin-bottom: 18px;
}
.body-p:last-child { margin-bottom: 0; }

/* Avec ça blocks */
.avecca-question {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 20px;
  margin-bottom: 12px;
}
.avecca-q-label { font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-light); margin-bottom: 10px; }
.avecca-q-text {
  font-family: 'Playfair Display', serif;
  font-style: italic; font-size: 17px; line-height: 1.5;
  color: var(--text);
}
.avecca-research {
  background: var(--night);
  border-radius: var(--r);
  padding: 20px; margin-bottom: 12px;
}
.avecca-r-label { font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(255,255,255,0.3); margin-bottom: 10px; }
.avecca-r-text { font-size: 14px; line-height: 1.72; color: rgba(255,255,255,0.82); }

/* Aller plus loin / chat */
.apl-block {
  background: var(--night);
  border-radius: var(--r);
  padding: 22px; margin-bottom: 12px;
}
.apl-title { font-size: 14px; font-weight: 600; color: white; margin-bottom: 14px; }
.apl-presets { display: flex; flex-direction: column; gap: 8px; margin-bottom: 18px; }
.apl-preset {
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.11);
  border-radius: var(--r-sm);
  padding: 13px 15px;
  text-align: left; color: rgba(255,255,255,0.82);
  font-size: 13px; line-height: 1.45;
  transition: background 0.14s; width: 100%;
}
.apl-preset:active { background: rgba(255,255,255,0.13); }
.apl-sep { font-size: 11px; color: rgba(255,255,255,0.22); text-align: center; margin: 12px 0; }
.apl-row { display: flex; gap: 8px; align-items: flex-end; }
.apl-textarea {
  flex: 1;
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.13);
  border-radius: var(--r-sm);
  padding: 11px 13px;
  color: white; font-size: 14px;
  resize: none; outline: none;
  min-height: 44px; max-height: 110px;
  line-height: 1.5;
}
.apl-textarea::placeholder { color: rgba(255,255,255,0.22); }
.apl-send {
  width: 44px; height: 44px; flex-shrink: 0;
  background: var(--accent); border: none;
  border-radius: var(--r-sm);
  display: flex; align-items: center; justify-content: center;
  transition: opacity 0.14s;
}
.apl-send:active { opacity: 0.82; }
.apl-send svg { width: 17px; height: 17px; color: white; }
.apl-response {
  margin-top: 14px;
  background: rgba(255,255,255,0.05);
  border-radius: var(--r-sm);
  padding: 15px;
  font-size: 14px; line-height: 1.72;
  color: rgba(255,255,255,0.82);
  display: none;
}
.apl-response.visible { display: block; }
.apl-dots { display: flex; gap: 4px; align-items: center; }
.apl-dot { width: 5px; height: 5px; background: rgba(255,255,255,0.4); border-radius: 50%; animation: dot-pulse 1.2s ease-in-out infinite; }
.apl-dot:nth-child(2) { animation-delay: 0.2s; }
.apl-dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes dot-pulse { 0%,80%,100%{opacity:.3;transform:scale(.8)} 40%{opacity:1;transform:scale(1)} }

.apl-key-section { margin-top: 14px; padding-top: 14px; border-top: 1px solid rgba(255,255,255,0.09); }
.apl-key-label { font-size: 10px; color: rgba(255,255,255,0.25); letter-spacing: 0.05em; margin-bottom: 8px; }
.apl-key-row { display: flex; gap: 8px; }
.apl-key-input {
  flex: 1; background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.09);
  border-radius: var(--r-xs); padding: 9px 11px;
  color: white; font-size: 12px; outline: none;
}
.apl-key-input::placeholder { color: rgba(255,255,255,0.18); }
.apl-key-btn {
  background: rgba(255,255,255,0.09); border: none;
  border-radius: var(--r-xs); padding: 9px 13px;
  color: white; font-size: 12px;
}

/* Sources */
.entry-sources {
  margin: 0 20px 28px;
  padding-top: 18px;
  border-top: 1px solid var(--border);
}
.sources-label { font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-light); margin-bottom: 7px; }
.sources-text { font-size: 12px; color: var(--text-light); line-height: 1.65; font-style: italic; }

/* Save btn */
.save-btn {
  display: inline-flex; align-items: center; gap: 6px;
  background: none;
  border: 1.5px solid var(--border);
  border-radius: 50px;
  padding: 8px 16px; margin: 0 20px 20px;
  font-size: 13px; color: var(--text-soft);
  transition: all 0.18s;
}
.save-btn.saved { border-color: var(--accent); color: var(--accent); background: var(--accent-soft); }
.save-btn svg { width: 13px; height: 13px; }

/* ═══════════════════════════════
   EXERCISE DETAIL SCREEN
═══════════════════════════════ */
.exo-header { padding: 52px 20px 20px; }
.exo-duration { font-size: 13px; color: var(--text-light); margin-top: 6px; }

.exo-steps { padding: 4px 20px 28px; }
.exo-step {
  display: flex; gap: 16px;
  padding: 20px 0;
  border-bottom: 1px solid var(--border);
}
.exo-step:last-of-type { border-bottom: none; }
.step-num {
  width: 30px; height: 30px; flex-shrink: 0;
  background: var(--accent-soft); color: var(--accent);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 600; margin-top: 1px;
}
.step-title { font-size: 14px; font-weight: 500; color: var(--text); margin-bottom: 5px; }
.step-text { font-size: 14px; line-height: 1.68; color: var(--text-soft); }

.exo-note {
  margin: 0 20px 28px;
  background: var(--night);
  border-radius: var(--r);
  padding: 18px 20px;
}
.exo-note-label { font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(255,255,255,0.3); margin-bottom: 8px; }
.exo-note-text { font-size: 14px; line-height: 1.7; color: rgba(255,255,255,0.8); font-style: italic; }
.exo-source { margin: 0 20px 28px; font-size: 12px; color: var(--text-light); font-style: italic; }

/* ═══════════════════════════════
   THEORY DETAIL SCREEN
═══════════════════════════════ */
.theory-header { padding: 52px 20px 20px; }
.theory-main-title {
  font-family: 'Playfair Display', serif;
  font-size: 24px; line-height: 1.25;
  color: var(--text); margin: 10px 0 5px;
}
.theory-author-line { font-size: 13px; color: var(--text-light); font-style: italic; }
.theory-body { padding: 24px 20px; }
.theory-p { font-size: 15px; line-height: 1.85; color: var(--text); margin-bottom: 20px; }
.theory-p:last-child { margin-bottom: 0; }

.theory-links {
  margin: 0 20px 28px;
  padding-top: 20px;
  border-top: 1px solid var(--border);
}
.theory-links-label { font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-light); margin-bottom: 12px; }
.theory-link {
  display: flex; align-items: center; justify-content: space-between;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--r-sm); padding: 13px 16px; margin-bottom: 8px;
  cursor: pointer; transition: background 0.14s;
}
.theory-link:active { background: var(--accent-soft); }
.theory-link-title { font-size: 14px; color: var(--text); }
.theory-link-sub { font-size: 11px; color: var(--text-light); margin-top: 2px; }
.theory-link svg { width: 14px; height: 14px; color: var(--text-light); }

/* ═══════════════════════════════
   JOURNAL SCREEN
═══════════════════════════════ */
.journal-header { padding: 52px 20px 20px; background: var(--surface); border-bottom: 1px solid var(--border); }
.journal-title { font-family: 'Playfair Display', serif; font-size: 26px; }
.journal-empty { padding: 64px 24px; text-align: center; }
.journal-empty-glyph { font-size: 32px; color: var(--text-light); margin-bottom: 14px; }
.journal-empty-text { font-size: 15px; color: var(--text-soft); line-height: 1.6; }

/* ═══════════════════════════════
   ANIMATIONS
═══════════════════════════════ */

// ═══════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════
let currentScreen  = 'maintenant';
let prevScreen     = 'maintenant';
let currentEntryId = null;
let currentExoId   = null;
let currentTheoryId= null;
let currentTab     = 'observer';
let currentSegment = 'entrees';
let currentFilter  = 'all';
let savedIds  = JSON.parse(localStorage.getItem('pap_saved')  || '[]');
let readIds   = JSON.parse(localStorage.getItem('pap_read')   || '[]');
let chatHist  = {};
let momentIdx = null;

// Domain config
const DOMAIN_CONFIG = {
  interieur:  { label: 'Intérieur',        pill: 'accent', chipClass: '' },
  autres:     { label: 'Avec les autres',  pill: 'rose',   chipClass: 'act-rose' },
  agir:       { label: 'Agir',             pill: 'sage',   chipClass: 'act-sage' },
  ressources: { label: 'Ressources',       pill: 'gold',   chipClass: 'act-gold' },
};

// ═══════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════
function nav(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(name + '-screen').classList.add('active');
  prevScreen = currentScreen;
  currentScreen = name;
  if (name === 'maintenant')   renderMaintenant();
  if (name === 'bibliotheque') renderBibliotheque();
  if (name === 'journal')      renderJournal();
}

function navDirect(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(name + '-screen').classList.add('active');
  prevScreen = currentScreen;
  currentScreen = name;
}

function goBack() {
  const dest = ['entry','exo','theory'].includes(currentScreen)
    ? prevScreen : 'maintenant';
  nav(dest);
}

// ═══════════════════════════════════════════
// MAINTENANT
// ═══════════════════════════════════════════
function renderMaintenant() {
  if (momentIdx === null) momentIdx = Math.floor(Math.random() * MOMENTS.length);
  renderMoment(momentIdx);
  renderRecentEntries();
}

function renderMoment(idx) {
  const m = MOMENTS[idx];
  const container = document.getElementById('moment-container');
  let footerHTML = '';
  let bodyHTML = '';

  if (m.type === 'exo') {
    const exo = EXERCISES.find(e => e.id === m.id);
    bodyHTML = `
      <div class="moment-card-title">${m.title}</div>
      <div class="moment-card-text">${m.preview}</div>`;
    footerHTML = `
      <button class="moment-start-btn" onclick="openExo(${m.id})">Commencer →</button>
      <button class="moment-skip-btn" onclick="skipMoment()">
        Autre chose
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1,4 1,10 7,10"/><path d="M3.51 15a9 9 0 102.13-9.36L1 10"/></svg>
      </button>`;
  } else {
    bodyHTML = `
      <div class="moment-card-title">${m.title}</div>
      <div class="moment-card-text" style="font-family:'Playfair Display',serif;font-style:italic;font-size:16px;line-height:1.6;color:var(--text)">${m.text}</div>
      <div class="moment-card-text" style="margin-top:10px;font-size:12px;color:var(--text-light)">${m.source}</div>`;
    footerHTML = `
      <div style="font-size:13px;color:var(--text-soft)">Prends le temps qu'il faut.</div>
      <button class="moment-skip-btn" onclick="skipMoment()">
        Autre chose
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1,4 1,10 7,10"/><path d="M3.51 15a9 9 0 102.13-9.36L1 10"/></svg>
      </button>`;
  }

  container.innerHTML = `
    <div class="moment-card">
      <div class="moment-card-type">
        <span class="pill ${m.type === 'exo' ? 'accent' : 'night'}" style="font-size:10px">${m.tag}</span>
      </div>
      <div class="moment-card-body">${bodyHTML}</div>
      <div class="moment-card-footer">${footerHTML}</div>
    </div>`;
}

function skipMoment() {
  momentIdx = (momentIdx + 1) % MOMENTS.length;
  renderMoment(momentIdx);
}

function renderRecentEntries() {
  // Show one entry from each domain for variety
  const domains = ['interieur','autres','agir','ressources'];
  const picks = domains.map(d => {
    const pool = ENTRIES.filter(e => e.domain === d);
    return pool[Math.floor(Math.random() * pool.length)];
  }).filter(Boolean).slice(0, 3);
  document.getElementById('recent-entries').innerHTML = picks.map(e => `
    <div class="quick-entry-card" onclick="openEntry(${e.id})">
      <div class="quick-entry-left">
        <div class="quick-entry-title">${e.title}</div>
        <div class="quick-entry-domain">${e.domainLabel}</div>
      </div>
      <span class="quick-entry-arrow">→</span>
    </div>`).join('');
}

// ═══════════════════════════════════════════
// BIBLIOTHÈQUE
// ═══════════════════════════════════════════
function renderBibliotheque() {
  renderFilters();
  renderBiblioList();
}

function setSegment(seg, btn) {
  currentSegment = seg;
  currentFilter = 'all';
  document.querySelectorAll('.seg-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderFilters();
  renderBiblioList();
}

function renderFilters() {
  const row = document.getElementById('filter-row');
  if (currentSegment === 'entrees') {
    const domains = ['all', ...Object.keys(DOMAIN_CONFIG)];
    row.innerHTML = domains.map(d => {
      const isAll = d === 'all';
      const cfg = DOMAIN_CONFIG[d];
      const label = isAll ? 'Tout' : cfg.label;
      const activeClass = currentFilter === d
        ? (isAll ? 'active' : cfg.chipClass)
        : '';
      return `<button class="chip ${activeClass}" onclick="setFilter('${d}',this)">${label}</button>`;
    }).join('');
  } else {
    const levels = ['all','fondation','approfondissement'];
    const labels = { all:'Tout', fondation:'Fondations', approfondissement:'Approfondissements' };
    row.innerHTML = levels.map(l => `
      <button class="chip ${currentFilter === l ? 'active' : ''}" onclick="setFilter('${l}',this)">${labels[l]}</button>
    `).join('');
  }
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active','act-rose','act-sage','act-gold'));
  if (f === 'all') btn.classList.add('active');
  else if (currentSegment === 'entrees') btn.classList.add(DOMAIN_CONFIG[f]?.chipClass || 'active');
  else btn.classList.add('active');
  renderBiblioList();
}

function onSearch() { renderBiblioList(); }

function renderBiblioList() {
  const q = (document.getElementById('search-input')?.value || '').toLowerCase();
  const container = document.getElementById('biblio-list');

  if (currentSegment === 'entrees') {
    const filtered = ENTRIES.filter(e => {
      const matchF = currentFilter === 'all' || e.domain === currentFilter;
      const matchQ = !q || e.title.toLowerCase().includes(q) || e.teaser.toLowerCase().includes(q);
      return matchF && matchQ;
    });
    container.innerHTML = filtered.length
      ? filtered.map(e => renderEntryCard(e)).join('')
      : `<div style="padding:40px 20px;text-align:center;color:var(--text-light);font-size:14px">Aucun résultat</div>`;
  } else {
    const filtered = THEORIES.filter(t => {
      const matchF = currentFilter === 'all' || t.level === currentFilter;
      const matchQ = !q || t.title.toLowerCase().includes(q) || t.author.toLowerCase().includes(q);
      return matchF && matchQ;
    });
    container.innerHTML = filtered.length
      ? filtered.map(t => renderTheoryCard(t)).join('')
      : `<div style="padding:40px 20px;text-align:center;color:var(--text-light);font-size:14px">Aucun résultat</div>`;
  }
}

function renderEntryCard(e) {
  const isRead = readIds.includes(e.id);
  return `
    <div class="card" onclick="openEntry(${e.id})">
      <div class="entry-card">
        <div class="entry-card-domain ${e.domain}">${e.domainLabel}</div>
        <div class="entry-card-title">${e.title}</div>
        <div class="entry-card-teaser">${e.teaser}</div>
        <div class="entry-card-footer">
          <span class="entry-read-badge ${isRead ? 'done' : ''}">${isRead ? '✓ Lu' : 'Non lu'}</span>
          <span style="color:var(--text-light)">→</span>
        </div>
      </div>
    </div>`;
}

function renderTheoryCard(t) {
  return `
    <div class="card" onclick="openTheory(${t.id})">
      <div class="theory-card">
        <div class="theory-card-level ${t.level}">${t.levelLabel}</div>
        <div class="theory-card-title">${t.title}</div>
        <div class="theory-card-author">${t.author}</div>
      </div>
    </div>`;
}

// ═══════════════════════════════════════════
// ENTRY DETAIL
// ═══════════════════════════════════════════
function openEntry(id) {
  currentEntryId = id;
  currentTab = 'observer';
  const e = ENTRIES.find(x => x.id === id);
  if (!readIds.includes(id)) { readIds.push(id); localStorage.setItem('pap_read', JSON.stringify(readIds)); }

  const pill = document.getElementById('entry-pill');
  pill.className = `pill ${e.pillClass}`;
  pill.textContent = e.domainLabel;
  document.getElementById('entry-title').textContent = e.title;

  const saved = savedIds.includes(id);
  document.getElementById('save-btn').classList.toggle('saved', saved);
  document.getElementById('save-label').textContent = saved ? 'Sauvegardé' : 'Sauvegarder';

  document.querySelectorAll('.tab-btn').forEach((b, i) => b.classList.toggle('active', i === 0));
  renderTab('observer', e);
  navDirect('entry');
  document.getElementById('entry-scroll').scrollTop = 0;
}

function switchTab(tab, btn) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const e = ENTRIES.find(x => x.id === currentEntryId);
  renderTab(tab, e);
  document.getElementById('entry-scroll').scrollTop = 240;
}

function renderTab(tab, e) {
  const c = document.getElementById('entry-tab-content');
  if (tab === 'observer') {
    c.innerHTML = `<div class="entry-body">
      <div class="body-label">Observer</div>
      ${e.observer.map(p => `<p class="body-p">${p}</p>`).join('')}
    </div>`;
  }
  if (tab === 'comprendre') {
    c.innerHTML = `<div class="entry-body">
      <div class="body-label">Comprendre</div>
      ${e.comprendre.map(p => `<p class="body-p">${p}</p>`).join('')}
    </div>
    <div class="entry-sources">
      <div class="sources-label">Sources</div>
      <div class="sources-text">${e.sources}</div>
    </div>`;
  }
  if (tab === 'avecca') {
    const hasKey = !!localStorage.getItem('pap_ak');
    c.innerHTML = `<div class="entry-body">
      <div class="body-label">Avec ça</div>
      <div class="avecca-question">
        <div class="avecca-q-label">Une question à se poser</div>
        <div class="avecca-q-text">${e.question}</div>
      </div>
      <div class="avecca-research">
        <div class="avecca-r-label">Ce que la recherche dit</div>
        <div class="avecca-r-text">${e.recherche}</div>
      </div>
      <div class="apl-block">
        <div class="apl-title">Aller plus loin</div>
        <div class="apl-presets">
          ${e.aplQuestions.map(q => `<button class="apl-preset" onclick="sendPreset(${e.id},'${q.replace(/'/g,"\\'")}')">${q}</button>`).join('')}
        </div>
        <div class="apl-sep">ou ta propre question</div>
        <div class="apl-row">
          <textarea class="apl-textarea" id="apl-in-${e.id}" placeholder="Ta question…" rows="1"
            onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendChat(${e.id})}"></textarea>
          <button class="apl-send" onclick="sendChat(${e.id})">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22,2 15,22 11,13 2,9"/></svg>
          </button>
        </div>
        <div class="apl-response" id="apl-res-${e.id}"></div>
        ${!hasKey ? `
        <div class="apl-key-section">
          <div class="apl-key-label">CLÉ API ANTHROPIC</div>
          <div class="apl-key-row">
            <input type="password" class="apl-key-input" id="apl-key-in" placeholder="sk-ant-…"/>
            <button class="apl-key-btn" onclick="saveApiKey()">OK</button>
          </div>
        </div>` : ''}
      </div>
    </div>`;
  }
}

function openExo(id) {
  currentExoId = id;
  const e = EXERCISES.find(x => x.id === id);
  document.getElementById('exo-title').textContent = e.title;
  document.getElementById('exo-duration').textContent = e.duration;
  document.getElementById('exo-steps').innerHTML = e.steps.map((s, i) => `
    <div class="exo-step">
      <div class="step-num">${i + 1}</div>
      <div>
        <div class="step-title">${s.title}</div>
        <div class="step-text">${s.text}</div>
      </div>
    </div>`).join('');
  document.getElementById('exo-note-block').innerHTML = `
    <div class="exo-note-label">Pourquoi ça marche</div>
    <div class="exo-note-text">${e.note}</div>`;
  document.getElementById('exo-source').textContent = e.source;
  navDirect('exo');
}

// THEORY DETAIL

function openTheory(id) {
  currentTheoryId = id;
  const t = THEORIES.find(x => x.id === id);

  const pill = document.getElementById('theory-pill');
  pill.textContent = t.badge;
  document.getElementById('theory-title').textContent = t.title;
  document.getElementById('theory-author').textContent = t.author;
  document.getElementById('theory-body').innerHTML = t.paragraphs.map(p => `<p class="theory-p">${p}</p>`).join('');

  const linked = t.linkedEntries.map(eid => ENTRIES.find(e => e.id === eid)).filter(Boolean);
  document.getElementById('theory-links').innerHTML = linked.length ? `
    <div class="theory-links-label">Dans les entrées</div>
    ${linked.map(e => `
      <div class="theory-link" onclick="openEntry(${e.id})">
        <div>
          <div class="theory-link-title">${e.title}</div>
          <div class="theory-link-sub">${e.domainLabel}</div>
        </div>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9,18 15,12 9,6"/></svg>
      </div>`).join('')}` : '';

  navDirect('theory');
}

// ═══════════════════════════════════════════
// JOURNAL
// ═══════════════════════════════════════════
function toggleSave() {
  const id = currentEntryId;
  savedIds = savedIds.includes(id) ? savedIds.filter(x => x !== id) : [...savedIds, id];
  localStorage.setItem('pap_saved', JSON.stringify(savedIds));
  const saved = savedIds.includes(id);
  document.getElementById('save-btn').classList.toggle('saved', saved);
  document.getElementById('save-label').textContent = saved ? 'Sauvegardé' : 'Sauvegarder';
}

function renderJournal() {
  const c = document.getElementById('journal-content');
  const saved = ENTRIES.filter(e => savedIds.includes(e.id));
  if (!saved.length) {
    c.innerHTML = `<div class="journal-empty">
      <div class="journal-empty-glyph">◇</div>
      <div class="journal-empty-text">Tes lectures sauvegardées<br>apparaîtront ici.</div>
    </div>`;
    return;
  }
  c.innerHTML = `<div style="padding-top:8px">${saved.map(e => renderEntryCard(e)).join('')}</div>`;
}

// ═══════════════════════════════════════════
// CHAT AI
// ═══════════════════════════════════════════
function sendPreset(id, q) {
  const inp = document.getElementById(`apl-in-${id}`);
  if (inp) inp.value = q;
  sendChat(id);
}

async function sendChat(id) {
  const inp = document.getElementById(`apl-in-${id}`);
  const res = document.getElementById(`apl-res-${id}`);
  if (!inp || !res) return;
  const q = inp.value.trim();
  if (!q) return;
  const key = localStorage.getItem('pap_ak');
  if (!key) {
    res.style.display = 'block';
    res.innerHTML = '<span style="color:rgba(255,160,160,0.9);font-size:13px">Entre une clé API Anthropic pour utiliser cette fonctionnalité.</span>';
    return;
  }
  const entry = ENTRIES.find(e => e.id === id);
  inp.value = '';
  res.style.display = 'block';
  res.innerHTML = '<div class="apl-dots"><div class="apl-dot"></div><div class="apl-dot"></div><div class="apl-dot"></div></div>';
  if (!chatHist[id]) chatHist[id] = [];
  chatHist[id].push({ role: 'user', content: q });
  try {
    const r = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': key,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true',
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: entry.aplSystem,
        messages: chatHist[id],
      }),
    });
    const data = await r.json();
    const text = data.content?.[0]?.text || 'Une erreur est survenue.';
    chatHist[id].push({ role: 'assistant', content: text });
    res.innerHTML = text.replace(/\n/g, '<br>');
  } catch {
    res.innerHTML = '<span style="color:rgba(255,160,160,0.9);font-size:13px">Erreur de connexion.</span>';
  }
}

function saveApiKey() {
  const inp = document.getElementById('apl-key-in');
  if (inp?.value.trim()) {
    localStorage.setItem('pap_ak', inp.value.trim());
    renderTab('avecca', ENTRIES.find(e => e.id === currentEntryId));
  }
}
